<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>pHscan – Wound Monitor</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;600;700;800&display=swap');

  :root {
    --bg: #0a0c0f;
    --surface: #111318;
    --border: #1e2128;
    --text: #e8eaf0;
    --muted: #555b6b;
    --accent: #00e5b4;
    --danger: #ff4d6d;
    --warn: #ffb830;
    --safe: #00e5b4;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* HEADER */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px 12px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    z-index: 10;
  }
  .logo { font-size: 22px; font-weight: 800; letter-spacing: -0.5px; }
  .logo span { color: var(--accent); }
  .logo sub { font-size: 11px; color: var(--muted); font-weight: 400; letter-spacing: 2px; font-family: 'DM Mono', monospace; }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); transition: background 0.3s; }
  .status-dot.live { background: var(--accent); box-shadow: 0 0 8px var(--accent); animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }

  /* CAMERA AREA */
  .camera-wrap {
    position: relative;
    flex: 1;
    overflow: hidden;
    background: #000;
  }

  video, canvas#overlay {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    object-fit: cover;
  }

  canvas#overlay { pointer-events: none; }

  /* CROSSHAIR */
  .crosshair {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 80px; height: 80px;
    pointer-events: none;
    z-index: 5;
  }
  .crosshair::before, .crosshair::after {
    content: '';
    position: absolute;
    background: rgba(255,255,255,0.9);
  }
  .crosshair::before { width: 1px; height: 100%; left: 50%; top: 0; }
  .crosshair::after  { width: 100%; height: 1px; top: 50%; left: 0; }

  .crosshair-ring {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 80px; height: 80px;
    border: 1.5px solid rgba(255,255,255,0.6);
    border-radius: 50%;
    pointer-events: none;
    z-index: 5;
    box-shadow: 0 0 0 1px rgba(0,0,0,0.4);
  }

  .corner { position: absolute; width: 16px; height: 16px; border-color: white; border-style: solid; }
  .corner.tl { top: 0; left: 0; border-width: 2px 0 0 2px; }
  .corner.tr { top: 0; right: 0; border-width: 2px 2px 0 0; }
  .corner.bl { bottom: 0; left: 0; border-width: 0 0 2px 2px; }
  .corner.br { bottom: 0; right: 0; border-width: 0 2px 2px 0; }

  .scan-frame {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 140px; height: 140px;
    pointer-events: none;
    z-index: 5;
  }

  /* SCAN LINE ANIMATION */
  .scan-line {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 140px; height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    opacity: 0;
    z-index: 6;
    pointer-events: none;
  }
  .scan-line.scanning { animation: scanMove 1.5s ease-in-out; }
  @keyframes scanMove {
    0% { opacity: 0; margin-top: -70px; }
    20% { opacity: 1; }
    80% { opacity: 1; }
    100% { opacity: 0; margin-top: 70px; }
  }

  /* COLOR SWATCH OVERLAY (top-left) */
  .live-color {
    position: absolute;
    top: 16px; left: 16px;
    z-index: 10;
    display: flex;
    align-items: center;
    gap: 10px;
    background: rgba(10,12,15,0.75);
    backdrop-filter: blur(8px);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 8px 12px;
  }
  .swatch {
    width: 32px; height: 32px;
    border-radius: 6px;
    border: 1px solid rgba(255,255,255,0.1);
    transition: background 0.1s;
  }
  .hex-val {
    font-family: 'DM Mono', monospace;
    font-size: 15px;
    font-weight: 500;
    letter-spacing: 1px;
  }

  /* START BUTTON */
  .start-btn {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    background: var(--accent);
    color: #000;
    border: none;
    padding: 16px 32px;
    border-radius: 50px;
    font-family: 'Syne', sans-serif;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    z-index: 20;
    letter-spacing: 0.5px;
  }

  /* BOTTOM PANEL */
  .bottom-panel {
    flex-shrink: 0;
    background: var(--surface);
    border-top: 1px solid var(--border);
    padding: 16px 20px 24px;
    z-index: 10;
  }

  /* CAPTURE BUTTON */
  .capture-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 20px;
    margin-bottom: 16px;
  }

  .capture-btn {
    width: 64px; height: 64px;
    border-radius: 50%;
    background: white;
    border: 4px solid var(--border);
    cursor: pointer;
    position: relative;
    outline: none;
    transition: transform 0.1s;
  }
  .capture-btn:active { transform: scale(0.93); }
  .capture-btn::after {
    content: '';
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 50px; height: 50px;
    border-radius: 50%;
    background: white;
    border: 2px solid #ccc;
  }

  .flip-btn {
    background: var(--border);
    border: none;
    color: var(--text);
    width: 44px; height: 44px;
    border-radius: 50%;
    font-size: 20px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }

  /* RESULT CARD */
  .result-card {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px 16px;
    display: none;
  }
  .result-card.show { display: block; }

  .result-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
  }
  .result-swatch {
    width: 40px; height: 40px;
    border-radius: 8px;
    flex-shrink: 0;
    border: 1px solid rgba(255,255,255,0.08);
  }
  .result-meta { flex: 1; }
  .result-hex { font-family: 'DM Mono', monospace; font-size: 13px; color: var(--muted); }
  .result-ph { font-size: 18px; font-weight: 700; }

  .status-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 4px 10px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }
  .badge-safe   { background: rgba(0,229,180,0.15); color: var(--safe); border: 1px solid rgba(0,229,180,0.3); }
  .badge-warn   { background: rgba(255,184,48,0.15);  color: var(--warn); border: 1px solid rgba(255,184,48,0.3); }
  .badge-danger { background: rgba(255,77,109,0.15); color: var(--danger); border: 1px solid rgba(255,77,109,0.3); }

  .divider { height: 1px; background: var(--border); margin: 10px 0; }

  .info-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    font-size: 13px;
  }
  .info-label { color: var(--muted); font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 1px; text-transform: uppercase; }
  .info-val { font-weight: 600; font-size: 13px; }

  .diseases-list {
    margin-top: 8px;
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }
  .disease-tag {
    background: var(--border);
    border-radius: 6px;
    padding: 4px 10px;
    font-size: 12px;
    font-family: 'DM Mono', monospace;
    color: var(--text);
  }

  .disclaimer {
    margin-top: 10px;
    font-size: 10px;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    line-height: 1.5;
    text-align: center;
  }

  /* TIME INPUT */
  .time-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 12px;
  }
  .time-row label { font-size: 12px; color: var(--muted); font-family: 'DM Mono', monospace; white-space: nowrap; }
  .time-row input {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    padding: 8px 10px;
    outline: none;
    -webkit-appearance: none;
    color-scheme: dark;
  }
</style>
</head>
<body>

<header>
  <div>
    <div class="logo">p<span>H</span>scan</div>
    <div style="font-size:10px;color:var(--muted);font-family:'DM Mono',monospace;letter-spacing:2px;margin-top:1px;">WOUND MONITOR</div>
  </div>
  <div class="status-dot" id="statusDot"></div>
</header>

<div class="camera-wrap" id="cameraWrap">
  <video id="video" playsinline autoplay muted></video>
  <canvas id="captureCanvas" style="display:none"></canvas>

  <!-- Crosshair -->
  <div class="scan-frame">
    <div class="corner tl"></div>
    <div class="corner tr"></div>
    <div class="corner bl"></div>
    <div class="corner br"></div>
  </div>
  <div class="crosshair-ring"></div>
  <div class="crosshair"></div>
  <div class="scan-line" id="scanLine"></div>

  <!-- Live color display -->
  <div class="live-color" id="liveColor" style="display:none">
    <div class="swatch" id="liveSwatch"></div>
    <div class="hex-val" id="liveHex">#------</div>
  </div>

  <button class="start-btn" id="startBtn" onclick="startCamera()">Tap to Start Camera</button>
</div>

<div class="bottom-panel">
  <div class="time-row">
    <label>BANDAID ON SINCE</label>
    <input type="datetime-local" id="appliedTime">
  </div>

  <div class="capture-row">
    <button class="flip-btn" onclick="flipCamera()" title="Flip camera">🔄</button>
    <button class="capture-btn" id="captureBtn" onclick="capture()" disabled title="Capture"></button>
    <div style="width:44px"></div>
  </div>

  <div class="result-card" id="resultCard">
    <div class="result-header">
      <div class="result-swatch" id="resultSwatch"></div>
      <div class="result-meta">
        <div class="result-hex" id="resultHex"></div>
        <div class="result-ph" id="resultPh"></div>
      </div>
      <div class="status-badge" id="statusBadge"></div>
    </div>
    <div class="divider"></div>
    <div class="info-row" style="margin-bottom:6px">
      <span class="info-label">Exposure Time</span>
      <span class="info-val" id="exposureTime">—</span>
    </div>
    <div class="info-row" style="margin-bottom:6px">
      <span class="info-label">pH Estimate</span>
      <span class="info-val" id="phVal">—</span>
    </div>
    <div class="info-row">
      <span class="info-label">Possible Concerns</span>
    </div>
    <div class="diseases-list" id="diseasesList"></div>
    <div class="disclaimer">⚠ Not a substitute for medical advice. Consult a healthcare professional.</div>
  </div>
</div>

<script>
  let stream = null;
  let facingMode = 'environment';
  let animFrame = null;
  const video = document.getElementById('video');
  const canvas = document.getElementById('captureCanvas');
  const ctx = canvas.getContext('2d', { willReadFrequently: true });

  // pH + disease database
  const phDatabase = [
    {
      label: 'Normal',
      phRange: [4.0, 5.5],
      badge: 'badge-safe',
      badgeText: '✓ Normal',
      diseases: [],
      advice: 'Healthy wound pH. No signs of infection.'
    },
    {
      label: 'Slightly Elevated',
      phRange: [5.5, 6.8],
      badge: 'badge-warn',
      badgeText: '⚡ Monitor',
      diseases: ['Early colonization', 'Skin flora imbalance'],
      advice: 'Slightly elevated. Monitor closely over next 24h.'
    },
    {
      label: 'Possibly Infected',
      phRange: [6.8, 7.8],
      badge: 'badge-warn',
      badgeText: '⚠ Elevated',
      diseases: ['Staphylococcus aureus', 'Streptococcus', 'MRSA (early)'],
      advice: 'pH elevated into infection-risk range.'
    },
    {
      label: 'Likely Infected',
      phRange: [7.8, 9.5],
      badge: 'badge-danger',
      badgeText: '✕ Infected',
      diseases: ['Pseudomonas aeruginosa', 'E. coli', 'Staphylococcus aureus', 'MRSA', 'Streptococcal cellulitis'],
      advice: 'High pH strongly suggests infection. See a doctor.'
    }
  ];

  // Color → pH mapping (calibrate to your bandaid's actual chemistry)
  function rgbToPh(r, g, b) {
    const h = rgbToHue(r, g, b);
    const sat = rgbToSat(r, g, b);
    const brightness = (r + g + b) / 3;

    // Low saturation = near original bandaid color = normal pH
    if (sat < 0.15) return 4.5;

    // Yellows (40-70°) = low pH, normal
    if (h >= 40 && h <= 70) return lerp(4.5, 5.5, (h - 40) / 30);
    // Yellow-green (70-100°) = slightly elevated
    if (h > 70 && h <= 100) return lerp(5.5, 6.5, (h - 70) / 30);
    // Green (100-160°) = elevated
    if (h > 100 && h <= 160) return lerp(6.5, 7.5, (h - 100) / 60);
    // Teal/blue-green (160-200°) = high
    if (h > 160 && h <= 220) return lerp(7.5, 8.5, (h - 160) / 60);
    // Blue-purple (220-290°) = very high
    if (h > 220 && h <= 290) return lerp(8.5, 9.5, (h - 220) / 70);
    // Reds/oranges = back to low pH
    if (h > 340 || h < 20) return lerp(4.0, 5.0, Math.min(sat, 1));
    // Orange (20-40°)
    if (h >= 20 && h < 40) return lerp(5.0, 5.5, (h - 20) / 20);

    return 5.0;
  }

  function lerp(a, b, t) { return a + (b - a) * Math.max(0, Math.min(1, t)); }

  function rgbToHue(r, g, b) {
    r /= 255; g /= 255; b /= 255;
    const max = Math.max(r,g,b), min = Math.min(r,g,b), d = max - min;
    if (d === 0) return 0;
    let h;
    if (max === r) h = ((g - b) / d) % 6;
    else if (max === g) h = (b - r) / d + 2;
    else h = (r - g) / d + 4;
    return ((h * 60) + 360) % 360;
  }

  function rgbToSat(r, g, b) {
    r /= 255; g /= 255; b /= 255;
    const max = Math.max(r,g,b), min = Math.min(r,g,b);
    return max === 0 ? 0 : (max - min) / max;
  }

  function toHex(r, g, b) {
    return '#' + [r, g, b].map(v => v.toString(16).padStart(2, '0')).join('').toUpperCase();
  }

  function getPhLevel(ph) {
    return phDatabase.find(d => ph >= d.phRange[0] && ph <= d.phRange[1]) || phDatabase[3];
  }

  // Sample center pixel
  function sampleCenter() {
    if (!video.videoWidth) return null;
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    ctx.drawImage(video, 0, 0);
    const cx = Math.floor(video.videoWidth / 2);
    const cy = Math.floor(video.videoHeight / 2);
    // Sample 5x5 area for stability
    const data = ctx.getImageData(cx - 2, cy - 2, 5, 5).data;
    let r = 0, g = 0, b = 0, count = 0;
    for (let i = 0; i < data.length; i += 4) {
      r += data[i]; g += data[i+1]; b += data[i+2]; count++;
    }
    return { r: Math.round(r/count), g: Math.round(g/count), b: Math.round(b/count) };
  }

  function liveLoop() {
    const px = sampleCenter();
    if (px) {
      const hex = toHex(px.r, px.g, px.b);
      document.getElementById('liveSwatch').style.background = hex;
      document.getElementById('liveHex').textContent = hex;
    }
    animFrame = requestAnimationFrame(liveLoop);
  }

  async function startCamera() {
    try {
      stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode, width: { ideal: 1280 }, height: { ideal: 720 } }
      });
      video.srcObject = stream;
      document.getElementById('startBtn').style.display = 'none';
      document.getElementById('liveColor').style.display = 'flex';
      document.getElementById('captureBtn').disabled = false;
      document.getElementById('statusDot').classList.add('live');
      liveLoop();
    } catch (e) {
      alert('Camera access denied. Please allow camera permission and reload.');
    }
  }

  async function flipCamera() {
    if (!stream) return;
    cancelAnimationFrame(animFrame);
    stream.getTracks().forEach(t => t.stop());
    facingMode = facingMode === 'environment' ? 'user' : 'environment';
    await startCamera();
  }

  function capture() {
    const px = sampleCenter();
    if (!px) return;

    // Animate scan line
    const line = document.getElementById('scanLine');
    line.classList.remove('scanning');
    void line.offsetWidth;
    line.classList.add('scanning');

    const hex = toHex(px.r, px.g, px.b);
    const ph = rgbToPh(px.r, px.g, px.b);
    const level = getPhLevel(ph);

    // Exposure time
    let exposureStr = '—';
    const appliedInput = document.getElementById('appliedTime').value;
    if (appliedInput) {
      const applied = new Date(appliedInput);
      const now = new Date();
      const diffMs = now - applied;
      if (diffMs > 0) {
        const hrs = Math.floor(diffMs / 3600000);
        const mins = Math.floor((diffMs % 3600000) / 60000);
        exposureStr = hrs > 0 ? `${hrs}h ${mins}m` : `${mins}m`;
      }
    }

    // Populate card
    document.getElementById('resultSwatch').style.background = hex;
    document.getElementById('resultHex').textContent = hex + ` · RGB(${px.r}, ${px.g}, ${px.b})`;
    document.getElementById('resultPh').textContent = `pH ~${ph.toFixed(1)} — ${level.label}`;
    document.getElementById('exposureTime').textContent = exposureStr;
    document.getElementById('phVal').textContent = `~${ph.toFixed(1)}`;

    const badge = document.getElementById('statusBadge');
    badge.className = 'status-badge ' + level.badge;
    badge.textContent = level.badgeText;

    const list = document.getElementById('diseasesList');
    list.innerHTML = level.diseases.length
      ? level.diseases.map(d => `<span class="disease-tag">${d}</span>`).join('')
      : `<span style="font-size:12px;color:var(--muted);font-family:'DM Mono',monospace">No concerns detected</span>`;

    document.getElementById('resultCard').classList.add('show');

    // Scroll into view
    setTimeout(() => document.getElementById('resultCard').scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 300);
  }

  // Default time to now
  const now = new Date();
  now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
  document.getElementById('appliedTime').value = now.toISOString().slice(0,16);
</script>
</body>
</html>
